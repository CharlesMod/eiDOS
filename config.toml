[llm]
# House nexus mind — Gemma-4-12B "house-ai" on gamingPC via llama.cpp (OpenAI-compatible).
# Routed through the live-monitor tap (:8088 -> :8081) so Nexus's token stream + tok/s
# appear on the :9100 dashboard. For a direct connection (no monitor), set url to :8081.
url = "http://127.0.0.1:8088"
model = "house-ai"
# Alt (uncensored, LM Studio): url="http://127.0.0.1:1234" model="qwen3.5-4b-uncensored-hauhaucs-aggressive"
temperature = 0.6
max_tokens = 4096
request_timeout_s = 300
top_p = 0.95
top_k = 20
min_p = 0.0
presence_penalty = 0.5

[tick]
interval_s = 2.5           # tick cadence (fast supervised mode); wakes instantly on chat/intervention
loop_detect_window = 4

[compaction]
token_threshold = 8000
tick_threshold = 20
max_tokens = 2048
retry_max_tokens = 4096
obs_max_chars = 16000
memory_max_chars = 6000
context_max_chars = 40000

[output]
truncation_chars = 3000

[safety]
# Soft auto-background threshold. A foreground bash command blocks the consciousness
# loop for at most this long; if it's still running, tool_bash hands it to the bg
# ledger (it keeps running, output preserved) and returns instantly so the loop stays
# free for LLM work. Keep this SMALL — latency is the enemy; we never want dead air.
cmd_timeout_s = 10
# Hard ceiling for async / auto-backgrounded jobs: if one runs longer than this it's
# killed and reported as [↩ job N · TIMED OUT]. Manual bg_run jobs are EXEMPT (you
# deliberately backgrounded those for long work).
cmd_async_ceiling_s = 180
disk_min_gb = 1.0
ram_max_pct = 90.0
bg_output_max_bytes = 10000000
protected_patterns = [
    "rm\\s+-rf\\s+/",
    "rm\\s+.*-r",
    "find\\s+.*-exec\\s+rm",
    "find\\s+.*-delete",
    "systemctl\\s+(stop|disable|kill)\\s+.*eidos",
    "nssm\\s+(stop|remove)\\s+.*(EiDOS|HouseAI)",
    "pkill.*eidos",
    "shutdown",
    "reboot",
    "halt",
    "mkfs",
    "dd\\s+.*of=/dev/",
    "format\\s+[A-Za-z]:",
    "python[^\\s]*\\s+\\S*eidos\\.py",
    "\\beidos\\.py",
    "\\./eidos\\.py",
    "llama[-_]?server",
    "llama[-_]?cli",
]

[session]
grace_period_s = 60

[self_healing]
restart_cmd = ""                # empty -> no systemd hot-swap / no llm restart (correct on Windows)
local_only = false
max_consecutive_failures = 5
max_tokens_ceiling = 8192
token_backoff_step = 512
reasoning_exhaust_compaction_trigger = 3

[rotation]
obs_max_lines = 5000
archive_days = 14
llm_log_max_bytes = 5000000
llm_log_archive_count = 3
metrics_max_bytes = 2000000
metrics_archive_count = 3
snapshot_max_count = 20

[context]
# Budgets opened up for the 128k-ctx house mind (Pi defaults were ~6500 total chars).
obs_max_chars = 30000
obs_max_count = 30
goal_max_chars = 3000
memory_max_chars = 8000
plan_max_chars = 2000
intelligence_max_chars = 3000
env_max_chars = 1000
interventions_max_chars = 6000     # chat history room
max_total_chars = 120000           # ~30k tokens — open it up; we have a 128k window, not a Pi
chars_per_token = 4.0              # Gemma tokenizer
briefing_model = true
dream_combined = true

[persona]
enabled = true

[dashboard]
port = 8099
# Shared token gating state-changing POSTs (self-edit approve/apply, git restore, etc.).
# Empty = off (accident-safety mode; fine for a trusted LAN/Tailscale buddy). Set a value
# to require ?token=... or an X-EiDOS-Token header on privileged actions.
token = ""

[self_improvement]
# Living self-guide (Dean-owned standing directives, injected every tick; eiDOS may PROPOSE).
self_guide_enabled = true
self_guide_max_chars_ctx = 1200
self_guide_max_bytes = 6000
# Listening hold: focusing the chat box quiets the loop so you can type without it racing.
chat_hold_ttl_s = 60
chat_hold_max_continuous_s = 300
# Git safety net: checkpoints + restore + watchdog crash-loop auto-rollback.
git_safety_enabled = true
git_self_branch = "eidos-self"
git_checkpoint_keep = 30
# Gated self-code-editing (eiDOS proposes -> you approve -> dashboard applies + restarts).
# Stays OFF until you flip it; the propose tool + UI exist regardless.
self_edit_enabled = false
self_edit_max_proposal_bytes = 200000
self_edit_health_probe_s = 90

[knowledge]
enabled = true
recall_top_k = 4
recall_max_chars = 3000
embedding_enabled = false
embedding_cohost = false
embedding_model_dir = "models/all-MiniLM-L6-v2"

[paths]
workspace = "C:/Users/cmod/llm/Kairos/workspace"
