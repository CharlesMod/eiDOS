# Creature mode (V3): run eidos as an undisturbed creature — creature-first system prompt, no task
# framing, no assigned goal. The full afferent nervous system is active either way; this just frees
# the creature from house-AI chores so we can watch what it does. Set false for the normal house eidos.
creature_mode = true
# The creature's shell: "wsl" runs its bash through WSL2 (real Linux — ls/grep/find/cat/sed, UTF-8,
# forward-slash paths), working WITH the model's bash fluency instead of translating to PowerShell.
# The source firewall covers WSL too (/mnt/c/...Kairos is blocked). The house-AI eiDOS always uses
# PowerShell. Set "powershell" to revert. Distro must auto-mount /mnt/c.
creature_shell = "wsl"
creature_wsl_distro = "Ubuntu-24.04"

[llm]
# The mind — gemma-4-12b-it Q8_0, served RESIDENT by llama-swap at http://127.0.0.1:9292 (alias
# "gemma-4-12b" in /etc/llama-swap/config.yaml) at 262144 ctx with full-precision f16 KV on the dual
# P100 (~21G; iSWA keeps the global KV to 8 layers). OpenAI-compatible; model is swappable — point
# [llm] at any OpenAI-compatible server (Ollama/LM Studio/llama.cpp) via config.local.toml or Settings.
url = "http://127.0.0.1:9292"
model = "gemma-4-12b"
# Gemma 4 official NON-THINKING sampler (the llama-swap entry runs --reasoning-budget 0 to match).
temperature = 1.0
max_tokens = 4096
request_timeout_s = 300
top_p = 0.95
top_k = 64
min_p = 0.0
presence_penalty = 0.0
frequency_penalty = 0.0
repeat_penalty = 1.0       # llama.cpp n-gram repeat penalty (1.0 = off)
grammar_enabled = true     # GBNF-constrained tick output (form enforced at the sampler)

[tick]
interval_s = 2.5           # tick cadence (fast supervised mode); wakes instantly on chat/intervention
loop_detect_window = 4

[compaction]
# token_threshold is REAL tokens now (should_compact divides obs bytes by chars_per_token). The old
# 8000 was compared to BYTES → dreamed at ~2k tokens of a 16k window (constant amnesia). 5000 lets the
# lived stream fill its share of the window before consolidating. tick_threshold is the dry-spell backstop.
token_threshold = 5000
tick_threshold = 60
max_tokens = 2048
retry_max_tokens = 4096
obs_max_chars = 16000
memory_max_chars = 6000
context_max_chars = 40000

[output]
truncation_chars = 3000

[safety]
# Soft auto-background threshold. A foreground bash command blocks the consciousness
# loop for at most this long; if it's still running, tool_bash hands it to the bg
# ledger (it keeps running, output preserved) and returns instantly so the loop stays
# free for LLM work. Keep this SMALL — latency is the enemy; we never want dead air.
cmd_timeout_s = 10
# Hard ceiling for async / auto-backgrounded jobs: if one runs longer than this it's
# killed and reported as [↩ job N · TIMED OUT]. Manual bg_run jobs are EXEMPT (you
# deliberately backgrounded those for long work).
cmd_async_ceiling_s = 180
# Generous lifetime cap for MANUAL bg_run jobs — long work is fine, but a runaway/infinite
# bg command (e.g. a `while($true)` poll loop) gets killed after this so it can't run forever.
bg_job_max_age_s = 1800
disk_min_gb = 1.0
ram_max_pct = 90.0
bg_output_max_bytes = 10000000
protected_patterns = [
    "rm\\s+-rf\\s+/",
    "rm\\s+.*-r",
    "find\\s+.*-exec\\s+rm",
    "find\\s+.*-delete",
    "systemctl\\s+(stop|disable|kill)\\s+.*eidos",
    "nssm\\s+(stop|remove)\\s+.*(EiDOS|HouseAI)",
    "pkill.*eidos",
    "shutdown",
    "reboot",
    "halt",
    "mkfs",
    "dd\\s+.*of=/dev/",
    "format\\s+[A-Za-z]:",
    "python[^\\s]*\\s+\\S*eidos\\.py",
    "\\beidos\\.py",
    "\\./eidos\\.py",
    "llama[-_]?server",
    "llama[-_]?cli",
]

[self_healing]
restart_cmd = ""                # empty -> no systemd hot-swap / no llm restart (correct on Windows)
local_only = false
max_consecutive_failures = 5
max_tokens_ceiling = 8192
token_backoff_step = 512
reasoning_exhaust_compaction_trigger = 3

[rotation]
obs_max_lines = 5000
archive_days = 14
llm_log_max_bytes = 5000000
llm_log_archive_count = 3
metrics_max_bytes = 2000000
thoughts_max_bytes = 2000000
metrics_archive_count = 3
snapshot_max_count = 20

[context]
# Sized COHERENT with the real served window: gemma is loaded at -c 16384 (llama-swap), NOT 128k.
# The rule: model n_ctx >= max_total_chars/chars_per_token + response_reserve. Here ~36k chars
# (~10-11k tok) + ~5k response (max_tokens 4096 + reasoning 1000) fits under 16384. (Phase 2 raises
# the model to -c 32768 with KV-quant and these open up.)
obs_max_chars = 22000              # the living stream — ~6k tok, matched to the compaction threshold
obs_max_count = 30
goal_max_chars = 3000
memory_max_chars = 8000
plan_max_chars = 2000
intelligence_max_chars = 4000      # recalled knowledge — the continuity that repopulates WM after a dream
env_max_chars = 1000
interventions_max_chars = 6000     # chat history room
max_total_chars = 37000            # safe-max BACKSTOP; history depth (12) bounds the stream so
                                   # the pre-dream total sits ~30k and this rarely fires (dream is the bound)
chars_per_token = 4.0              # Gemma tokenizer (optimistic; tool-trace runs ~3.3 — thresholds hold a margin)
stable_head_cache = true           # BIBLE §2.11 delta prompting: re-render the KV-stable head only on a source change (kill-switch)
dream_combined = true

world_state_max_items = 12
notebook_max_chars = 1200

[persona]
enabled = true

[dashboard]
port = 8099
voice_port = 8098   # standalone voice service (phase 8.3): GLaDOS TTS + GPU speech-gate
# Shared token gating state-changing POSTs (self-edit approve/apply, git restore, etc.).
# Empty = off (accident-safety mode; fine for a trusted LAN/Tailscale buddy). Set a value
# to require ?token=... or an X-EiDOS-Token header on privileged actions.
token = ""
# Bind interface. Default 0.0.0.0 (all interfaces — reachable over LAN/Tailscale). Set to
# "127.0.0.1" to restrict the dashboard (incl. the control plane) to localhost only. With an
# empty token AND host=0.0.0.0 the dashboard prints a loud open-control-plane warning at boot.
host = "0.0.0.0"

[self_improvement]
# Living self-guide (Dean-owned standing directives, injected every tick; eiDOS may PROPOSE).
self_guide_enabled = true
self_guide_max_chars_ctx = 1200
self_guide_max_bytes = 6000
# Listening hold: focusing the chat box quiets the loop so you can type without it racing.
chat_hold_ttl_s = 60
chat_hold_max_continuous_s = 300
# Git safety net: checkpoints + restore + watchdog crash-loop auto-rollback.
git_safety_enabled = true
git_checkpoint_keep = 30
# Gated self-code-editing (eiDOS proposes -> you approve -> dashboard applies + restarts).
# Enabled: eiDOS may PROPOSE source edits (harmless staging); applying still requires Dean's
# approval in the dashboard, and a bad apply auto-rolls-back via the watchdog.
self_edit_enabled = true
self_edit_max_proposal_bytes = 200000
self_edit_health_probe_s = 90
# Stale-heartbeat watchdog: if eiDOS is alive but hasn't completed a tick (heartbeat frozen) for
# this long, it's wedged (hung dream / persistent LLM timeout) — the watchdog restarts it. The
# heartbeat only advances on a SUCCESSFUL tick, and the LLM timeout is 300s, so 600s clears a
# couple of transient failures but catches a real wedge. Bounded to 3 restarts / 30 min.
eidos_stuck_threshold_s = 600

[knowledge]
enabled = true
recall_top_k = 4
dedup_threshold = 0.65
recall_max_chars = 3000
embedding_enabled = true
embedding_cohost = true
# Semantic recall routes to the RESIDENT GPU embedding server (nomic-embed-text-v1.5, 768-dim,
# served by llama-embedding.service at :8082) — embed_texts POSTs there instead of falling back to
# the in-process ONNX all-MiniLM (384-dim). Leave endpoint empty to use ONNX. (Model field is a
# label; the server serves whatever model it loaded.)
embedding_endpoint = "http://127.0.0.1:8082"
embedding_model = "nomic-embed-text-v1.5"
embedding_model_dir = "models/all-MiniLM-L6-v2"   # in-process ONNX fallback when the endpoint is down
# systemd unit backing the endpoint above. When set, the dashboard Start/GO buttons start it and
# Pause/STOP stop it — so the embedder's resident GPU VRAM is freed whenever the creature is parked
# and restored when it runs (unlike the llama-swap mind, this server does NOT idle-unload). The
# dashboard manages it best-effort via `sudo -n systemctl` (POSIX only; empty = don't touch it).
embedding_service = "llama-embedding.service"

[delegate]
# Hand long-horizon coding/investigation tasks to the pi coding agent (background job,
# result returns tagged [↩ delegate N]). Brain = same house-ai model, own 32k context.
enabled = true
timeout_s = 600
# Extra roots the delegate may use as cwd. The eiDOS repo itself is HARD-DENIED in code
# regardless of this list (only the workspace/delegate sandbox inside it is allowed).
allowed_dirs = []
max_sessions = 12
# '' resolves `pi` from PATH (/usr/bin/pi on Sprinter — npm -g @earendil-works/pi-coding-agent).
pi_path = ""
# The "house" provider lives in ~/.pi/agent/models.json → llama-swap (:8080, OpenAI-compatible);
# gemma4-12b is the resident house mind, qwen27b available by name for heavier reasoning.
pi_provider = "house"
pi_model = "gemma4-12b"

[ide]
# Browser mini-IDE over the pi coding agent (EidosCodeIDE service, :8100). Each
# "stint" is a persistent interactive `pi --mode rpc` process + working dir + chat.
enabled = true
port = 8100
pi_provider = "house-tap"   # route via :8088 monitor tap so IDE tokens show on :9100
pi_model = "house-ai"
max_stints = 8
stint_idle_timeout_s = 1800

[nervous]
# V3 afferent nervous-system bus (P0 — the seam). Defaults live in config.py; override here.
enabled = true
transport = "inproc"          # "inproc" | "zmq" (deployment-manifest switch, I9)
bind = "tcp://0.0.0.0:8120"
peer = "tcp://127.0.0.1:8120"
fungible_qsize = 256
reliable_backpressure_max_s = 30.0
admits_per_source_per_window = 1000
heartbeat_interval_s = 0.5

# Structural agency (BIBLE §7). Both default ON in config.py; kill-switches here.
goaltension_enabled = true    # Ventral Striatum: unfinished objective → arousal floor (initiative when idle)
temperament_enabled = true    # DMN: slow initiative/persistence/caution drift → gate threshold + goal-tension itch

# Metabolism — food = literal battery power (2026-06-20 pivot). This node is a stationary,
# solar-powered desktop → archetype "plant": recharges from environmental power (solar) only, never by
# napping. ("animal" = a mobile bot that recharges by resting/docking.) The solar curve is the INTERIM
# placeholder; the real power source is the Renogy Rover 20A BLE (SOC + PV watts) — set
# metabolism_solar_enabled = false once that reader is wired.
metabolism_archetype = "plant"
# Per-tick energy drains — sized so a full day's charge coasts most of the ~10h solar-dark night rather
# than flooring at empty a few hours after sunset (the old 0.001/0.004/0.002 kept the creature pinned
# "running low" ~1/3 of its life, which the model narrated as relentless somatic gloom).
metabolism_basal_drain = 0.0006      # just being alive, per tick
metabolism_cognition_drain = 0.002   # one LLM "thought" — the dearest metabolic event
metabolism_action_drain = 0.001      # a world-touching tool action
metabolism_solar_enabled = true    # FALLBACK only — used when the real power feed below is stale/absent
metabolism_solar_peak = 0.05       # per-tick charge at solar noon
metabolism_solar_sunrise_h = 6.0
metabolism_solar_sunset_h = 20.0

# M4 real power — the Renogy MPPT over BLE is the REAL food source (replaces the solar placeholder when
# fresh). SOC is derived from real LiFePO4 voltage and anchors the reserve; PV watts is the recharge.
# Self-healing: when Dean uses the Renogy phone app (one BLE central at a time), reads fail-open + back
# off and the reserve falls back to the solar sim, then re-anchors when the link is free again.
power_enabled = true
power_mppt_address = "C4:64:E3:53:D9:00"   # BT-TH-E353D900 (the MPPT charge controller)
power_poll_interval_s = 60.0
power_stale_after_s = 600.0
power_battery_cells = 8            # LiFePO4 8S = 24V nominal
power_battery_capacity_ah = 100.0  # 24V 100Ah ≈ 2.56 kWh

[pillars]
# Pillars roadmap (PILLARS_PLAN.md / PILLARS_TODO.md). Every feature ships DARK behind its flag;
# a flag flips ON only after that phase's red-able gate passes. Defaults live in config.py.
causal_ledger_enabled = true      # 0.3 per-tick pressure-field log for "show me why it did that"
backup_enabled = true             # 0.4 automated workspace snapshots during sleep (life insurance)
killable_skills_enabled = true    # 1.2 subprocess-isolated, hard-killable skills (no more tick freezes)
memory_engram_enabled = true      # 2.1 the engram + hot/episodic/long-term stores (engram.py; a library until 2.2 wires it in)
skill_affordances_enabled = true  # 3.1 surface top-K situation-relevant skills at the decision point
skill_economy_enabled = true      # 3.2 similarity-priced authoring + reuse-favoring XP + auto-retire
skill_composition_enabled = true  # 3.3 the `call` atom (skill→skill): depth cap 2, shared budget, static cycle check, promotion-to-atom
quests_enabled = true             # 5.1 quest engine (the System: issue/track/adjudicate)
tool_unlocks_enabled = true       # 5.x TOOL_PROGRESSION ladder: unit grants + visible_tools + nap curve + alleles — LIVE 2026-07-05 (maiden walk)
memory_manager_enabled = true     # 2.2 store importer + 4-layer recall cascade (memory_manager.py)
recall_explore_ratio = 0.15       # 2.2 fraction of a recall set reserved for a low-strength sample (anti-Matthew)
recall_recency_enabled = true     # recall tilts toward the present: floored recency factor over the cascade + BM25 (never buries, only re-orders)
encode_salience_enabled = true    # §M-1 arousal-modulated encoding: the emotional stamp seeds birth strength — flat ticks fade first, spiked moments persist
sleep_engine_enabled = true       # 2.4 job-list sleep: consolidation/decay/distillation (nervous/sleep.py)
max_wake_hours = 18.0             # 2.4 adenosine cap: past this, sleep-pressure overrides all drive floors
expectations_enabled = true       # 4.1 expectation ledger: typed predictions closed by glue → surprise
max_open_predictions = 12         # 4.1 bound on simultaneously-open predictions
salience_gate_enabled = true      # 1.3 salience-gate organ: admission bias = salience × relevance × neuromod gain
bet_ledger_enabled = true         # 2.3 recall-utility loop: injected engrams are bets settled by glue (never self-report)
learning_xp_enabled = true        # 4.2 XP weighted by learning progress (falling error slope); grind/noise pay ~0
news_enabled = true               # 4.4 news queue: deferred communication, presence-gated, engagement-ranked
news_max_items = 20               # 4.4 bound on queued news (eviction/expiry past this)
mastery_gates_enabled = true      # 4.3 levels = glue-checked mastery evidence; XP is just the progress bar
min_sleeps_per_level = 3          # 4.3 mandatory digestion between levels (spacing effect as a hard floor)
administrator_enabled = true      # 5.2 the System-LLM: dossier → grammar-constrained proposals, event-driven check-ins
administrator_autonomy = "full"   # 5.2 STANDING operator grant (Charlie, 2026-07-05): valid, leak-free quests auto-issue —
                                  # the vocabulary/grammar/leak rails make bad quests unrepresentable, so approval added only
                                  # latency. The panel is now an audit trail; /api/admin/revoke stays the ban-hammer.
commission_enabled = true         # COMMISSION_PLAN.md: standing orders — brief/todo/verdict settlement; U7 verbs
shadows_enabled = false           # 6 scripted CPU workers: trusted skill + event loop + budget + dead-man lease
shadow_capacity = 1               # 6 concurrent shadow slots at unlock; grows on demonstrated stewardship
generals_enabled = false          # 7 delegated LLM minds on mission contracts (slot-sharing substrate)
max_generals = 5                  # DERIVED (0.5 spike): empirical 8-slot ceiling @8k − 2 headroom − the mind's slot

[paths]
# Relative paths anchor at the repo root (resolved in config.py), so this is portable across machines
# and OSes. Use an absolute path or "~/..." only to put the mind's memory somewhere else.
workspace = "workspace"
