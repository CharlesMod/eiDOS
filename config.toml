[llm]
url = "http://100.113.123.91:1234"
model = "qwen3.5-4b-uncensored-hauhaucs-aggressive"
temperature = 0.6
max_tokens = 2048
request_timeout_s = 300
top_p = 0.95
top_k = 20
min_p = 0.0
presence_penalty = 1.5

[tick]
interval_s = 300
loop_detect_window = 3

[compaction]
token_threshold = 8000
tick_threshold = 20
max_tokens = 4096             # thinking models need headroom for reasoning + content
# Generous budgets for distillation — compaction needs to see everything
obs_max_chars = 16000       # observation chars fed to compaction LLM call
memory_max_chars = 6000     # memory chars fed to compaction LLM call
context_max_chars = 40000   # total compaction prompt budget (~11400 tokens)

[output]
truncation_chars = 2000

[safety]
cmd_timeout_s = 120
disk_min_gb = 1.0
ram_max_pct = 85.0
protected_patterns = [
    "rm\\s+-rf\\s+/",
    "systemctl\\s+(stop|disable|kill)\\s+.*kairos",
    "pkill.*kairos",
    "kill.*kairos",
    "shutdown",
    "reboot",
    "halt",
    "mkfs",
    "dd\\s+.*of=/dev/",
]

[session]
grace_period_s = 60

[rotation]
obs_max_lines = 5000
archive_days = 14

[context]
obs_max_chars = 4000
obs_max_count = 20
# Per-section budgets for normal ticks — keep lean for fast inference
goal_max_chars = 2000
memory_max_chars = 4000
env_max_chars = 800
interventions_max_chars = 2000
max_total_chars = 24000     # total tick context budget (~6800 tokens)
chars_per_token = 3.5       # rough estimate for Qwen3

[persona]
enabled = true

[paths]
workspace = "workspace"
